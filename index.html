<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <title>E-Commerce Store</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <!-- NAVBAR -->
      <nav>
        <h1><i class="ri-store-2-line"></i> E-Commerce</h1>
        <div class="links">
          <p id="home">Home</p>
          <p>Products</p>
          <p id="cart">Cart <span id="cart-count">0</span></p>
        </div>
        <div class="icon">
          <i class="ri-shopping-cart-line"></i>
          <i class="ri-user-fill"></i>
        </div>
      </nav>

      <!-- PRODUCTS SECTION — JS will fill this -->
      <section></section>

      <!-- CART SCREEN — hidden by default -->
      <div class="cart-screen">
        <h2 class="empty-msg">No Items Added <i class="ri-shopping-bag-line"></i></h2>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
